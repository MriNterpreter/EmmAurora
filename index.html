<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Las Aventuras de Emma Aurora</title>
  <style>
    body { background: #87CEEB; font-family: 'Comic Sans MS', cursive, sans-serif; margin: 0; text-align: center; color: #fff; overflow: hidden; }
    header { background: #FF69B4; padding: 10px; border-bottom: 5px solid #fff; }
    h1 { font-size: 1.8rem; margin: 5px 0; text-shadow: 2px 2px #FF1493; }
    canvas { background: #90EE90; border: 8px solid #fff; border-radius: 25px; display: block; margin: 15px auto; max-width: 95%; cursor: pointer; }
    #hud { display: flex; justify-content: space-around; font-size: 2rem; color: #FF4500; font-weight: bold; text-shadow: 2px 2px #fff; }
    #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,105,180,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
    .btn { padding: 20px 40px; font-size: 2.5rem; border-radius: 60px; background: #32CD32; color: white; border: 5px solid #fff; cursor: pointer; box-shadow: 0 5px 0 #228B22; }
  </style>
</head>
<body>

<header>
  <h1>🌟 Las Aventuras de Emma Aurora 🌟</h1>
  <p>(Un paseo por la cocina y los alimentos saludables)</p>
</header>

<div id="overlay">
  <h2 style="font-size: 3rem;">¿Lista para jugar, Emma?</h2>
  <button class="btn" onclick="startGame()">¡JUGAR! ▶️</button>
</div>

<div id="hud">
  <span>⭐ <span id="score">0</span></span>
  <span>⏰ <span id="timer">120</span>s</span>
</div>
<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreHud = document.getElementById('score');
  const timerHud = document.getElementById('timer');

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  function playYum() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setValueAtTime(523, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1046, audioCtx.currentTime + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
  }

  function playOops() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  }

  let gameActive = false, score = 0, timeLeft = 120, items = [], timerInterval;
  let player = { x: 150, y: 450, w: 100, h: 100 };
  const playerImg = new Image(); 
  playerImg.src = 'daughter.png'; 

  const food = {
    good: ['🍎','🥦','🍌','🍓','🥛','💧','🥣','🥕','🍒','🥗','🍍'],
    bad: ['🍬','🍩','🥤','🍪','🍟','🍕','🍦','🍺','🍫']
  };

  function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('overlay').style.display = 'none';
    gameActive = true; score = 0; timeLeft = 120; items = [];
    scoreHud.innerText = "0"; timerHud.innerText = "120";
    
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft--;
      timerHud.innerText = timeLeft;
      if (timeLeft <= 0) endGame();
    }, 1000);

    spawnItem(); draw();
  }

  function spawnItem() {
    if(!gameActive) return;
    const isGood = Math.random() > 0.45;
    const list = isGood ? food.good : food.bad;
    items.push({
      x: Math.random() * (canvas.width - 50), y: -50,
      emoji: list[Math.floor(Math.random() * list.length)],
      type: isGood ? 'good' : 'bad', speed: 2.0 + (score / 40)
    });
    setTimeout(spawnItem, 1300);
  }

  // Variable para el mensaje de la ensalada
  let bonusText = { text: "", x: 0, y: 0, timer: 0 };

  function draw() {
    if (!gameActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (playerImg.complete) {
        ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);
    }

    // Dibujar el mensaje de "Super puntos" si está activo
    if (bonusText.timer > 0) {
        ctx.fillStyle = "#FF4500";
        ctx.font = "bold 25px Comic Sans MS";
        ctx.fillText(bonusText.text, bonusText.x, bonusText.y);
        bonusText.y -= 1; // El texto flota hacia arriba
        bonusText.timer--;
    }

    items.forEach((item, i) => {
      item.y += item.speed;
      ctx.font = "50px Arial"; ctx.fillText(item.emoji, item.x, item.y);
      
      if (item.y > player.y && item.y < player.y + player.h && item.x > player.x - 10 && item.x < player.x + player.w) {
        
        if (item.emoji === '🍺') {
            playOops();
            endGame("¡Oh no! Eso no es para niñas, pequeña Aurora. ¡A buscar comida saludable!");
        } 
        else if (item.emoji === '🥗') {
            score += 5;
            playYum();
            scoreHud.innerText = score;
            // Activar el mensaje especial
            bonusText = { 
                text: "¡Super puntos de ensalada!", 
                x: player.x - 50, 
                y: player.y - 20, 
                timer: 60 // Duración del mensaje (aprox 1 segundo)
            };
        }
        else if (item.type === 'good') { 
            score++; scoreHud.innerText = score; playYum(); 
        } 
        else { 
            score = Math.max(0, score - 2); scoreHud.innerText = score; playOops(); 
        }
        items.splice(i, 1);
      }
      if (item.y > 600) items.splice(i, 1);
    });
    if (gameActive) requestAnimationFrame(draw);
  }

  function endGame(msg) {
    gameActive = false; 
    clearInterval(timerInterval);
    setTimeout(() => {
      alert(msg || "¡Tiempo cumplido! Emma Aurora logró " + score + " estrellas ⭐.");
      document.getElementById('overlay').style.display = 'flex';
    }, 100);
  }

  const move = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.touches ? e.touches.clientX : e.clientX;
    let target = x - rect.left - player.w/2;
    if(target < 0) target = 0;
    if(target > canvas.width - player.w) target = canvas.width - player.w;
    player.x = target;
  };
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('touchmove', (e) => { move(e); e.preventDefault(); }, {passive: false});
</script>
</body>
</html>
