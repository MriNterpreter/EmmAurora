<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Healthy Habits Adventure!</title>
  <style>
    body { 
      background: #87CEEB; /* Sky Blue */
      font-family: 'Comic Sans MS', cursive, sans-serif; 
      margin: 0; text-align: center; color: #fff; overflow: hidden;
    }
    header { background: #FF69B4; padding: 15px; border-bottom: 5px solid #fff; }
    canvas { 
      background: #90EE90; /* Grass Green */
      border: 10px solid #fff; border-radius: 25px; 
      display: block; margin: 20px auto; max-width: 95%; cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    #hud { font-size: 2.5rem; color: #FF4500; font-weight: bold; text-shadow: 2px 2px #fff; }
    #overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(255,105,180,0.95); display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 10;
    }
    .btn { 
      padding: 25px 50px; font-size: 2.5rem; border-radius: 60px; 
      border: 5px solid #fff; cursor: pointer; background: #32CD32; color: white;
      box-shadow: 0 5px 0 #228B22;
    }
    .btn:active { transform: translateY(4px); box-shadow: none; }
  </style>
</head>
<body>

<header>
  <h1>🌟 HEALTHY HABITS ADVENTURE 🌟</h1>
</header>

<div id="overlay">
  <h2 style="font-size: 3.5rem; margin-bottom: 10px;">Ready to Play?</h2>
  <p style="font-size: 1.5rem; margin-bottom: 30px;">Catch the Yummy Food! Avoid the Junk!</p>
  <button class="btn" onclick="startGame()">START! ▶️</button>
</div>

<div id="hud">Stars: 0</div>
<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const hud = document.getElementById('hud');

  let gameActive = false;
  let score = 0;
  // Adjusted player size for her photo
  let player = { x: 150, y: 480, w: 100, h: 100 };
  let items = [];

  const playerImg = new Image();
  playerImg.src = 'daughter.png'; 

  const foodData = {
    healthy: ['🍎', '🥦', '🥛', '🍓', '💧', '🥣', '🍌','🍕,'🥕'], 
    junk: ['🍬', '🍩', '🥤', '🍪', '🍟', '🍦']
  };

  function startGame() {
    document.getElementById('overlay').style.display = 'none';
    gameActive = true;
    score = 0;
    items = [];
    hud.innerText = "Stars: 0";
    spawnItem();
    draw();
  }

  function spawnItem() {
    if(!gameActive) return;
    const isHealthy = Math.random() > 0.45;
    const list = isHealthy ? foodData.healthy : foodData.junk;
    items.push({
      x: Math.random() * (canvas.width - 50),
      y: -50,
      emoji: list[Math.floor(Math.random() * list.length)],
      type: isHealthy ? 'good' : 'bad',
      speed: 1.5 + (score / 20) // Starts slow, gets slightly faster
    });
    setTimeout(spawnItem, 1500); 
  }

  function draw() {
    if (!gameActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Player Image
    if (playerImg.complete) {
      ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);
    }

    items.forEach((item, i) => {
      item.y += item.speed;
      ctx.font = "50px Arial";
      ctx.fillText(item.emoji, item.x, item.y);

      // Collision Detection
      if (item.y > player.y && item.y < player.y + player.h && 
          item.x > player.x - 20 && item.x < player.x + player.w) {
        if (item.type === 'good') {
          score++;
          hud.innerText = "Stars: " + score;
          items.splice(i, 1);
        } else {
          endGame();
        }
      }
      if (item.y > 600) items.splice(i, 1);
    });

    requestAnimationFrame(draw);
  }

  function endGame() {
    gameActive = false;
    alert("Great job! You got " + score + " stars! ✨ Let's eat healthy!");
    document.getElementById('overlay').style.display = 'flex';
  }

  // Mouse/Touch controls - centered on her photo
  const moveHandler = (e) => {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let targetX = (clientX - rect.left) - player.w/2;
    
    // Keep her on the screen
    if(targetX < 0) targetX = 0;
    if(targetX > canvas.width - player.w) targetX = canvas.width - player.w;
    
    player.x = targetX;
  };

  canvas.addEventListener('mousemove', moveHandler);
  canvas.addEventListener('touchmove', (e) => {
    moveHandler(e);
    e.preventDefault();
  }, {passive: false});
</script>

</body>
</html>
