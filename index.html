<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Healthy Habits Adventure!</title>
  <style>
    body { 
      background: #87CEEB; font-family: 'Comic Sans MS', cursive, sans-serif; 
      margin: 0; text-align: center; color: #fff; overflow: hidden;
    }
    header { background: #FF69B4; padding: 15px; border-bottom: 5px solid #fff; }
    canvas { 
      background: #90EE90; border: 10px solid #fff; border-radius: 25px; 
      display: block; margin: 20px auto; max-width: 95%; cursor: pointer;
    }
    #hud { font-size: 2.5rem; color: #FF4500; font-weight: bold; text-shadow: 2px 2px #fff; }
    #overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(255,105,180,0.95); display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 10;
    }
    .btn { padding: 25px 50px; font-size: 2.5rem; border-radius: 60px; background: #32CD32; color: white; border: 5px solid #fff; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <h1>🌟 HEALTHY HABITS ADVENTURE 🌟</h1>
</header>

<div id="overlay">
  <h2 style="font-size: 3.5rem; margin-bottom: 10px;">Ready to Play?</h2>
  <button class="btn" onclick="startGame()">START! ▶️</button>
</div>

<div id="hud">Stars: 0</div>
<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const hud = document.getElementById('hud');

  // AUDIO ENGINE (Using browser synth so no files needed!)
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  function playYumSound() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
    osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1); // C6
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
  }

  function playOopsSound() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
  }

  let gameActive = false;
  let score = 0;
  let player = { x: 150, y: 480, w: 100, h: 100 };
  let items = [];

  const playerImg = new Image();
  playerImg.src = 'daughter.png'; 

  const foodData = {
    healthy: ['🍎', '🥦', '🥛', '🍓', '💧', '🥣', '🍌', '🥕'], 
    junk: ['🍬', '🍩', '🥤', '🍪', '🍟', '🍕', '🍦']
  };

  function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('overlay').style.display = 'none';
    gameActive = true;
    score = 0;
    items = [];
    hud.innerText = "Stars: 0";
    spawnItem();
    draw();
  }

  function spawnItem() {
    if(!gameActive) return;
    const isHealthy = Math.random() > 0.45;
    const list = isHealthy ? foodData.healthy : foodData.junk;
    items.push({
      x: Math.random() * (canvas.width - 50),
      y: -50,
      emoji: list[Math.floor(Math.random() * list.length)],
      type: isHealthy ? 'good' : 'bad',
      speed: 2.0 + (score / 25)
    });
    setTimeout(spawnItem, 1500); 
  }

  function draw() {
    if (!gameActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (playerImg.complete) {
      ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);
    }

    items.forEach((item, i) => {
      item.y += item.speed;
      ctx.font = "50px Arial";
      ctx.fillText(item.emoji, item.x, item.y);

      if (item.y > player.y && item.y < player.y + player.h && 
          item.x > player.x - 20 && item.x < player.x + player.w) {
        if (item.type === 'good') {
          score++;
          hud.innerText = "Stars: " + score;
          playYumSound();
          items.splice(i, 1);
        } else {
          playOopsSound();
          endGame();
        }
      }
      if (item.y > 600) items.splice(i, 1);
    });
    requestAnimationFrame(draw);
  }

  function endGame() {
    gameActive = false;
    setTimeout(() => {
      alert("Great job! You got " + score + " stars! ✨ Let's eat healthy!");
      document.getElementById('overlay').style.display = 'flex';
    }, 100);
  }

  const moveHandler = (e) => {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches.clientX : e.clientX;
    let targetX = (clientX - rect.left) - player.w/2;
    if(targetX < 0) targetX = 0;
    if(targetX > canvas.width - player.w) targetX = canvas.width - player.w;
    player.x = targetX;
  };

  canvas.addEventListener('mousemove', moveHandler);
  canvas.addEventListener('touchmove', (e) => { moveHandler(e); e.preventDefault(); }, {passive: false});
</script>

</body>
</html>
